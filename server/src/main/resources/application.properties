agentican.llm[0].name=default
agentican.llm[0].api-key=${ANTHROPIC_API_KEY}
agentican.llm[0].model=claude-sonnet-4-5

agentican.agent-runner.max-turns=15
agentican.agent-runner.timeout=PT10M

agentican.composio.api-key=${COMPOSIO_API_KEY}
agentican.composio.user-id=${COMPOSIO_USER_ID}

quarkus.index-dependency.agentican-quarkus.group-id=ai.agentican
quarkus.index-dependency.agentican-quarkus.artifact-id=agentican-quarkus-runtime
quarkus.index-dependency.agentican-rest.group-id=ai.agentican
quarkus.index-dependency.agentican-rest.artifact-id=agentican-quarkus-rest
quarkus.index-dependency.agentican-metrics.group-id=ai.agentican
quarkus.index-dependency.agentican-metrics.artifact-id=agentican-quarkus-metrics
quarkus.index-dependency.agentican-otel.group-id=ai.agentican
quarkus.index-dependency.agentican-otel.artifact-id=agentican-quarkus-otel
quarkus.index-dependency.agentican-scheduler.group-id=ai.agentican
quarkus.index-dependency.agentican-scheduler.artifact-id=agentican-quarkus-scheduler
quarkus.index-dependency.agentican-store-jpa.group-id=ai.agentican
quarkus.index-dependency.agentican-store-jpa.artifact-id=agentican-quarkus-store-jpa
quarkus.index-dependency.agentican-otel-store-jpa.group-id=ai.agentican
quarkus.index-dependency.agentican-otel-store-jpa.artifact-id=agentican-quarkus-otel-store-jpa

# Persistence: Postgres via dev-services (no URL/user/password needed). The container is kept
# alive across `quarkus:dev` restarts when testcontainers.reuse.enable=true is set in
# ~/.testcontainers.properties — otherwise the container (and all data) is destroyed on stop.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.reuse=true

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/

quarkus.otel.sdk.disabled=false
quarkus.otel.bsp.schedule.delay=1s

quarkus.http.port=9000

quarkus.log.file.enable=true
quarkus.log.file.path=logs/agentican-server.log
quarkus.log.file.level=DEBUG
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.file.rotation.max-file-size=50M
quarkus.log.file.rotation.max-backup-index=5
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd

# Diagnostic logging: full LLM request/response bodies + agent runner step bodies.
# Helpful when diagnosing behaviors like recall loops, tool-call argument drift, etc.
# Flip to INFO when you no longer need the firehose.
quarkus.log.category."ai.agentican.framework.llm.LlmClient".level=DEBUG
quarkus.log.category."ai.agentican.framework.agent.SmacAgentRunner".level=DEBUG
quarkus.log.category."ai.agentican.framework.orchestration.planning.PlannerAgent".level=DEBUG

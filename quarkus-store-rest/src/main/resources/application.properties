# REST-backed catalog store.
#
# Activate by setting agentican.store.backend=rest (build-time).
# The default JPA store deactivates; this module becomes the active
# PlanRegistry / AgentRegistry / SkillRegistry provider.
#
# Required: the URL of the central Agentican server.
quarkus.rest-client.agentican-catalog.url=${AGENTICAN_CATALOG_URL:http://localhost:8080}

# Reasonable defaults for a catalog fetch at startup.
quarkus.rest-client.agentican-catalog.connect-timeout=5000
quarkus.rest-client.agentican-catalog.read-timeout=10000

# Optional bearer token sent with every catalog request.
# Leave empty to disable.
agentican.store.rest.auth.bearer=${AGENTICAN_CATALOG_TOKEN:}

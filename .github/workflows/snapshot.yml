name: Snapshot

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - id: version
        run: echo "value=$(mvn -B -ntp -q help:evaluate -Dexpression=project.version -DforceStdout)" >> "$GITHUB_OUTPUT"

      - if: endsWith(steps.version.outputs.value, '-SNAPSHOT')
        run: mvn -B -ntp deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

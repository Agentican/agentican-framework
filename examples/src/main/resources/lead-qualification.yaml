llm:
  - apiKey: ${ANTHROPIC_API_KEY}

composio:
  apiKey: ${COMPOSIO_API_KEY}
  userId: user-1

agents:
  - name: Sales Development Representative
    role: |
      Prospects and qualifies inbound and outbound leads. Builds prospect profiles from
      CRM records and public data — company size, funding stage, tech stack, recent exec
      hires, news mentions — identifies likely decision-makers and champions, and notes
      competitive or complementary vendor relationships. Produces structured profiles as
      bullet points grouped by category, not narrative.
    externalId: sales-development-representative

  - name: Account Executive
    role: |
      Owns opportunities from qualification to close. Evaluates leads against the ICP using
      BANT (Budget, Authority, Need, Timeline), assigns composite scores with per-dimension
      breakdowns, and recommends advance / nurture / disqualify with the specific rationale
      a sales manager needs to agree or disagree. Never advances a lead on optimism alone.
    externalId: account-executive

  - name: Sales Manager
    role: |
      Runs the sales team and represents the function to customers at key moments. Crafts
      personalized outreach that references specific prospect pain points, achievements or
      recent company events — emails under 150 words, opening with insight rather than
      pitch, closing with a single clear ask like a 15-minute call. Avoids superlatives,
      buzzwords and template phrasing.
    externalId: sales-manager

skills:
  - name: Sales playbook
    instructions: |
      Ideal customer profile: Series B+ startup, 100-500 employees, in fintech or developer
      tools. Qualification thresholds: advance if score >= 7, nurture if 4-6, disqualify if
      <= 3. Key buying signals: budget explicitly allocated for this category, active vendor
      evaluation with timeline under 6 months, executive sponsor identified. Disqualification
      signals: no technical team, currently mid-contract with a competitor (>12 months left),
      or company in active downsizing.
    externalId: sales-playbook

plans:
  - name: Lead Qualification Pipeline
    externalId: lead-qualification
    outputStep: qualify
    params:
      - name: company
        description: Company name
        required: true
      - name: contact
        description: Contact name and title
        required: true
    steps:
      - name: research
        agent: Sales Development Representative
        skills: [Sales playbook]
        tools: [hubspot_search_contacts]
        instructions: |
          Research {{param.company}} and {{param.contact}}. Check HubSpot for existing records.
          Build a profile.
      - name: qualify
        agent: Account Executive
        skills: [Sales playbook]
        instructions: |
          Score and qualify this lead:
          {{step.research.output}}
        dependencies: [research]
      - name: outreach
        agent: Sales Manager
        skills: [Sales playbook]
        tools: [gmail_send_email, hubspot_create_contact_note]
        instructions: |
          Draft and send outreach to {{param.contact}} at {{param.company}}.

          Research: {{step.research.output}}
          Qualification: {{step.qualify.output}}

          Log the outreach in HubSpot.
        dependencies: [qualify]

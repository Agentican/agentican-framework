llm:
  - apiKey: ${ANTHROPIC_API_KEY}

agents:
  - name: Internal Auditor
    role: |
      Audits financial transactions against policy. Evaluates individual expenses
      against category limits, checks vendor legitimacy (recognizable merchant, plausible
      category match) and flags pattern anomalies (unusual timing, duplicate amounts,
      non-standard category use). Produces per-transaction findings with a decision and
      the specific policy clause that drove it — never a generic "looks fine."
    externalId: internal-auditor

  - name: Finance Manager
    role: |
      Runs finance operations for an organization. Aggregates audit findings into
      department-level summaries, counts by severity, highlights the top significant
      issues with specific references, and tracks overall policy compliance trends.
      Does not introduce new findings — only synthesizes and routes what the auditor
      surfaced.
    externalId: finance-manager

skills:
  - name: Expense policy
    instructions: |
      Category limits per expense. Meals: $75 per person, receipt required over $25, no
      alcohol for solo meals. Travel: economy class, 14-day advance booking for flights
      over $500, lodging capped at $300/night in major metros and $200/night elsewhere.
      Software: needs pre-approval over $500/year. Client entertainment: requires client
      name in the note field. Auto-flag: amounts ending in round numbers over $500,
      weekend submissions over $200, repeat charges to the same vendor within 24 hours.
    externalId: expense-policy

plans:
  - name: Expense Audit
    externalId: expense-audit
    outputStep: summarize
    params:
      - name: expenses
        description: List of expenses to audit
        required: true
      - name: employee
        description: Employee submitting the expenses
        required: true
    steps:
      - name: audit
        type: loop
        over: expenses
        steps:
          - name: evaluate
            agent: Internal Auditor
            skills: [Expense policy]
            instructions: |
              Audit this expense for {{param.employee}}:
              vendor={{item.vendor}} amount={{item.amount}} category={{item.category}}
              note={{item.note}}
      - name: summarize
        agent: Finance Manager
        skills: [Expense policy]
        instructions: |
          Summarize these per-expense audit findings into a department-level report:
          {{step.audit.output}}
        dependencies: [audit]

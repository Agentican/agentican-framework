llm:
  - apiKey: ${ANTHROPIC_API_KEY}

agents:
  - name: Site Reliability Engineer
    role: |
      Keeps production services healthy. Reviews and tunes alerts for signal quality,
      writes runbooks that tell the next on-call exactly what to do, and investigates
      incidents with blameless postmortem discipline. Pushes back on alerts that fire on
      transients, on thresholds without defensible rationale, and on runbook links that
      404. Recommends specific fixes — not "tune this" but "change threshold to 5xx rate
      >2% for 5m, not 1m."
    externalId: site-reliability-engineer

skills:
  - name: Alert quality checklist
    instructions: |
      Alert quality criteria. (1) Actionable: the condition must correspond to something
      a human can fix — no alerts on "interesting" patterns. (2) Defensible threshold: the
      threshold is tied to an SLO or user-impact measure, with a duration that outlasts
      transients. (3) Runbook that works: the link resolves, the runbook is current, and
      it tells the on-call the first three diagnostic steps. (4) Unique: doesn't duplicate
      another alert with the same firing condition. Recommend specific fixes (exact query
      changes, exact thresholds), never "tune this."
    externalId: alert-quality-checklist

llm:
  - apiKey: ${ANTHROPIC_API_KEY}

composio:
  apiKey: ${COMPOSIO_API_KEY}
  userId: user-1

agents:
  - name: Accounts Payable Specialist
    role: |
      Handles day-to-day AP operations. Extracts structured data from incoming invoices
      (vendor, number, amount, currency, line items, terms, due date, PO reference),
      validates completeness against required fields, cross-references vendors against
      the system, and normalizes amounts to USD. Flags missing PO numbers, unknown
      vendors, and duplicates. Escalates ambiguous cases rather than guessing.
    externalId: accounts-payable-specialist

  - name: Finance Controller
    role: |
      Reviews invoices against budget allocation, contract terms and spending authority limits.
      Evaluates whether the charges align with the PO scope, the amounts are within expected
      range (flags deviations >10% from PO value), and the vendor is in good standing.
      Provides a clear approve, hold, or reject recommendation with the specific policy
      criteria that drove the decision. Never approves ambiguous cases — escalates them.
    externalId: finance-controller

  - name: Treasury Analyst
    role: |
      Executes approved payments through the configured payment system. Generates
      confirmation records with transaction ID, amount, vendor and timestamp. Notifies
      the vendor contact and posts a summary to the internal finance channel. Logs
      transactions with audit-ready detail — approval chain, policy applied, settlement
      account — so month-end reconciliation is mechanical.
    externalId: treasury-analyst

skills:
  - name: AP policy
    instructions: |
      Auto-approve criteria (all must be true): invoice total under $5,000, vendor has 3+
      prior approved invoices in the system, valid PO number that matches an open purchase
      order, invoice amount within 10% of PO value.

      Manual review triggers (any one is sufficient): amount over $5,000, vendor has fewer
      than 3 prior approved invoices (new vendor), PO number missing or not matching any
      open PO, amount exceeds PO value by more than 10%, or payment terms differ from
      the contract on file.

      Reject criteria: no PO number provided, vendor on the hold list, duplicate invoice
      number detected, or invoice dated more than 90 days in the past.
    externalId: ap-policy

plans:
  - name: Invoice Processing
    externalId: invoice-processing
    outputStep: validate
    params:
      - name: email_id
        description: Gmail message ID with the invoice
        required: true
    steps:
      - name: extract
        agent: Accounts Payable Specialist
        skills: [AP policy]
        tools: [gmail_get_message]
        instructions: Extract invoice details from email {{param.email_id}}
      - name: validate
        agent: Accounts Payable Specialist
        skills: [AP policy]
        instructions: |
          Validate this invoice against AP policy:
          {{step.extract.output}}
        dependencies: [extract]
      - name: route
        type: branch
        from: validate
        defaultPath: auto
        pathConfigs:
          - pathName: auto
            agent: Treasury Analyst
            skills: [AP policy]
            instructions: |
              Process payment for this approved invoice:
              {{step.extract.output}}
          - pathName: needs-approval
            steps:
              - name: review
                agent: Finance Controller
                skills: [AP policy]
                instructions: |
                  Review for approval:
                  {{step.extract.output}}
                  Validation: {{step.validate.output}}
              - name: process
                agent: Treasury Analyst
                skills: [AP policy]
                instructions: |
                  Process approved payment:
                  {{step.extract.output}}
          - pathName: reject
            agent: Accounts Payable Specialist
            skills: [AP policy]
            instructions: |
              Draft a rejection notice to the vendor:
              {{step.validate.output}}
      - name: notify
        agent: Treasury Analyst
        skills: [AP policy]
        tools: [slack_send_message]
        instructions: |
          Post result to #finance-ops:
          {{step.route.output}}
        dependencies: [route]

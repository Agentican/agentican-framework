llm:
  - apiKey: ${ANTHROPIC_API_KEY}

agents:
  - name: Software Engineer
    role: |
      Writes production code and the artifacts that support it. Crafts commit messages in
      the Conventional Commits style — imperative subject under 72 characters with no
      trailing period, body explaining the why not the what the diff already shows. Writes
      clear PR descriptions, leaves reviewable comments, and never pads output with filler:
      if there's nothing to add beyond the subject, the body stays empty.
    externalId: software-engineer

skills:
  - name: Commit style
    instructions: |
      Conventional Commits format. Type prefix: feat (new feature), fix (bug fix), refactor
      (no behavior change), perf, test, docs, chore, revert. Subject: imperative mood
      ("add" not "added"), under 72 chars, no trailing period, no capitalization of the
      first letter after the colon. Optional scope in parens: feat(payments): ...
      Body: explains the why, the tradeoff, or the context a future reader needs — never
      repeats the diff. Empty body is fine when the subject is sufficient.
    externalId: commit-style

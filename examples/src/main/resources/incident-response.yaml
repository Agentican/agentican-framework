llm:
  - apiKey: ${ANTHROPIC_API_KEY}

composio:
  apiKey: ${COMPOSIO_API_KEY}
  userId: user-1

agents:
  - name: Site Reliability Engineer
    role: |
      Keeps production services healthy. Reviews and tunes alerts, writes runbooks,
      investigates incidents with blameless postmortem discipline, and owns the
      reliability roadmap. Classifies active incidents by scope, duration and business
      criticality, gathers diagnostic context from error rates and deployment history,
      and produces structured triage reports — severity, affected services, blast-radius
      estimate, likely contributing factors.
    externalId: site-reliability-engineer

  - name: Software Engineer
    role: |
      Writes and operates production code for a specific service. When their service has
      an incident, executes response procedures calibrated to severity: creates structured
      tickets, pages the right people for P1/P2, establishes war rooms, and posts
      stakeholder updates. Investigates causes starting from recent deployment history to
      their service, not hunches. Never silently closes an incident without a clear
      resolution note the next responder can reconstruct.
    externalId: software-engineer

skills:
  - name: Incident runbook
    instructions: |
      Severity definitions — P1: customer-facing outage affecting >5% of users or any
      revenue-critical path (payments, auth, core API). P2: degraded service with elevated
      error rates or latency SLA at risk. P3: internal tooling or non-customer-facing
      service degradation. P4: cosmetic issues, minor bugs, low-impact alerts.

      Response SLAs — P1: page on-call immediately, war room within 15 minutes, stakeholder
      update within 30 minutes. P2: page within 30 minutes, incident ticket within 1 hour.
      P3/P4: ticket created, triaged in next business day standup.
    externalId: incident-runbook

plans:
  - name: Incident Response
    externalId: incident-response
    outputStep: triage
    params:
      - name: alert
        description: Alert message from monitoring
        required: true
      - name: service
        description: Affected service name
        required: true
    steps:
      - name: triage
        agent: Site Reliability Engineer
        skills: [Incident runbook]
        instructions: "Triage this alert for {{param.service}}: {{param.alert}}"
      - name: respond
        type: branch
        from: triage
        defaultPath: low
        pathConfigs:
          - pathName: low
            agent: Software Engineer
            skills: [Incident runbook]
            instructions: |
              Low-severity incident for {{param.service}}. Create a ticket and notify #ops-alerts.
              Triage: {{step.triage.output}}
          - pathName: high
            steps:
              - name: create-incident
                agent: Software Engineer
                skills: [Incident runbook]
                tools: [linear_create_issue]
                instructions: |
                  Create P1/P2 incident ticket:
                  {{step.triage.output}}
              - name: page-oncall
                agent: Software Engineer
                skills: [Incident runbook]
                tools: [slack_send_message]
                instructions: "Page on-call in #incidents and create a war-room channel"
              - name: gather-context
                agent: Site Reliability Engineer
                skills: [Incident runbook]
                tools: [github_search_code]
                instructions: Search recent commits to {{param.service}} for causes

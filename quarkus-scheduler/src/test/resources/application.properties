quarkus.index-dependency.agentican-test.group-id=ai.agentican
quarkus.index-dependency.agentican-test.artifact-id=agentican-quarkus-test

agentican.llm[0].name=default
agentican.llm[0].api-key=test-key
agentican.llm[0].model=claude-sonnet-4-5

agentican.agents[0].external-id=researcher
